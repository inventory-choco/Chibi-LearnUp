backend:
  name: git-gateway
  branch: main

media_folder: "assets"
public_folder: "assets"

collections:
  - name: "site"
    label: "Website Content"
    files:
      - name: "main"
        label: "Main Website Content"
        file: "content/site.json"
        format: "json"
        fields:
          - label: "Hero Title"
            name: "hero_title"
            widget: "string"
            hint: "This is the main heading shown on the homepage."

          - label: "Hero Description"
            name: "hero_description"
            widget: "text"
            hint: "This text appears below the main heading on the homepage."

          - label: "Homepage Banners"
            name: "banners"
            widget: "list"
            min: 1
            max: 6
            summary: "{{fields.alt}}"
            hint: "These are the current homepage banner images. Maximum 6 banners allowed. You can remove existing banner items and add new ones. Recommended size: 1600 × 800 px, ratio 2:1. Maximum file size: 3 MB."
            fields:
              - label: "Banner Image"
                name: "image"
                widget: "image"
                choose_url: false
                media_folder: "assets/banner"
                public_folder: "assets/banner"
                hint: "Upload or choose a banner image from the banner folder. Recommended size: 1600 × 800 px. Maximum file size: 3 MB."

              - label: "Banner Description / Alt Text"
                name: "alt"
                widget: "string"
                hint: "Short description of this banner. Example: Basic English Learning Banner."

          - label: "Events & Activities Gallery"
            name: "events"
            widget: "list"
            min: 0
            max: 12
            summary: "{{fields.alt}}"
            hint: "These are the current event/activity images shown on the website. Maximum 12 event images allowed. You can remove existing event items and add new ones. Recommended size: 1200 × 800 px or 1000 × 1000 px. Maximum file size: 3 MB."
            fields:
              - label: "Event Image"
                name: "image"
                widget: "image"
                choose_url: false
                media_folder: "assets/event"
                public_folder: "assets/event"
                hint: "Upload or choose an event image from the event folder. Recommended size: 1200 × 800 px. Maximum file size: 3 MB."

              - label: "Event Description / Alt Text"
                name: "alt"
                widget: "string"
                hint: "Short description of this event image. Example: Drawing class activity."
